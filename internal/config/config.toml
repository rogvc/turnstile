allow = [
  # Turnstile
  'turnstile\b',

  # Version control
  'git\b',
  'gh\b',
  'GH_TOKEN=',

  # Python
  'python3?\b',
  'pip3?\b',
  'pip\b',
  'pytest\b',
  'source\b',
  'venv\b',
  'virtualenv\b',
  'uv\b',

  # Kubernetes / Helm  (delete/uninstall live in deny)
  'kubectl\b',
  'helm\b',

  # Go
  'go\b',
  'gofmt\b',
  'golint\b',
  'golangci-lint\b',

  # Docker  (volume-mount and --privileged patterns live in deny)
  'docker\b',

  # Cloud / security scanning
  'curl\b',
  'wget\b',
  'trivy\b',
  'aws\b',

  # Shell navigation / environment
  'cd\b',
  'pwd\b',
  'export\b',
  'unset\b',
  'set\b',

  # Shell utilities — prefix-matched only; flags are NOT inspected.
  'ls\b', 'cat\b', 'head\b', 'tail\b', 'grep\b', 'rg\b', 'find\b',
  'wc\b', 'stat\b', 'echo\b', 'printf\b', 'du\b', 'df\b', 'env\b',
  'which\b', 'type\b', 'file\b', 'sort\b', 'uniq\b', 'cut\b', 'tr\b',
  'awk\b', 'sed\b', 'xargs\b', 'jq\b', 'yq\b',
  'tar\b', 'gzip\b', 'gunzip\b', 'zcat\b', 'base64\b',
  'basename\b', 'dirname\b', 'realpath\b', 'readlink\b', 'date\b',
  'true\b', 'false\b', 'test\b', '\[\s',
  'diff\b', 'patch\b', 'less\b', 'more\b', 'tee\b', 'mktemp\b',
  'mkdir\b', 'touch\b', 'cp\b', 'mv\b', 'chmod\b', 'chown\b',
  'ps\b', 'kill\b', 'pkill\b', 'pgrep\b', 'lsof\b', 'netstat\b', 'ss\b',
  'openssl\b', 'ssh\b', 'scp\b', 'rsync\b',
  'watch\b', 'timeout\b', 'sleep\b', 'wait\b', 'read\b', 'mapfile\b',
  'column\b', 'fmt\b',

  # Control flow
  'for\b', 'do\b', 'done\b', 'while\b', 'if\b', 'then\b', 'else\b',
  'elif\b', 'fi\b', 'case\b', 'esac\b', 'in\b',

  # Common variable assignments
  'VENV=', 'SCRIPTS_DIR=', 'TASK=', 'NS=',
  'GIT_DIR=', 'GIT_WORK_TREE=',
  'GOPATH=', 'GOROOT=', 'GOBIN=', 'PATH=',

  # Validated subshell placeholder injected by extractSubshells()
  '__SUBSHELL__\b',

  # Generic bare variable assignment: result=..., dir=..., etc.
  '\w+=',
]

deny = [
  # Destructive file ops
  ':\(\)\s*\{',
  'mkfs\b',
  'dd\s+if=',
  'chmod\s+-R\s+777',
  'passwd\b',

  # Docker — host volume mount requires regex; native Bash(*) globs cannot inspect flag arguments.
  # Use safePathExemptions to allow /tmp and /var/tmp mounts.
  'docker\s+run\b.*(?:-v|--volume)\s+/',

  # Reading sensitive credential files via shell commands
  '\S+\s+.*[~/]\.ssh/',
  '\S+\s+.*[~/]\.aws/',
  '\S+\s+.*[~/]\.gnupg/',
]

tools = [
  "Read", "Glob", "Grep", "Write", "Edit",
  "Agent", "Skill", "ToolSearch",
  "TaskCreate", "TaskUpdate", "TaskGet", "TaskList", "TaskOutput", "TaskStop",
  "TodoRead", "TodoWrite",
  "WebFetch", "WebSearch",
]
